services:
  db:
    image: postgres:15-alpine
    container_name: db
    environment: 
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "password"
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - voting-network
  redis:
    image: redis:7-alpine
    container_name: redis
    networks:
      - voting-network
  vote:
    build: ./vote
    container_name: vote
    ports:
      - "5000:80"
    networks:
      - voting-network
    depends_on:
      - redis
  result:
    build: ./result
    container_name: result
    ports:
      - "5001:4000"
    environment:
      - PORT=4000
    networks:
      - voting-network
    depends_on:
      db:
        condition: service_healthy
  worker:
    build: ./worker
    container_name: worker
    networks:
      - voting-network
    depends_on:
      - redis
      - db
networks:
  voting-network:
    driver: bridge
volumes:
  db-data:
