global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets:
          - "prometheus:9090"

  - job_name: "vote"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "vote:80"

  - job_name: "result"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "result:4000"

  - job_name: "redis"
    static_configs:
      - targets:
          - "redis-exporter:9121"

  - job_name: "postgres"
    static_configs:
      - targets:
          - "postgres-exporter:9187"

  - job_name: "cadvisor"
    static_configs:
      - targets:
          - "cadvisor:8080"