name: Promote Existing Release to Production

on:
  workflow_dispatch:
    inputs:
      release_id:
        description: Full 40-character commit SHA of a tested release
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: promote-prod
  cancel-in-progress: false

jobs:
  promote-prod:
    name: Promote and verify prod
    runs-on: ubuntu-latest
    environment:
      name: prod
    env:
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
      K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}
      SSM_RELEASES_PATH: ${{ vars.SSM_RELEASES_PATH }}
      SSM_ENV_PATH: ${{ vars.SSM_ENV_PATH }}
      HELM_VALUES_FILE: ${{ vars.HELM_VALUES_FILE }}
      EXPECTED_CERTIFICATE_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/heads/main
      EXPECTED_OIDC_ISSUER: https://token.actions.githubusercontent.com
      RELEASE_ID: ${{ inputs.release_id }}

    steps:
      - name: Validate promotion configuration
        run: |
          [[ "${RELEASE_ID}" =~ ^[0-9a-f]{40}$ ]]
          test -n "${AWS_ACCOUNT_ID}"
          test -n "${AWS_REGION}"
          test -n "${AWS_ROLE_ARN}"
          test -n "${EKS_CLUSTER_NAME}"
          test -n "${K8S_NAMESPACE}"
          test -n "${SSM_RELEASES_PATH}"
          test -n "${SSM_ENV_PATH}"
          test -n "${HELM_VALUES_FILE}"

      - name: Create promotion bot token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349
        with:
          app-id: ${{ vars.PROMOTION_APP_ID }}
          private-key: ${{ secrets.PROMOTION_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@95ef2b042f9d7a56d8268cba8559e2842e2ad01b
        with:
          ruby-version: "3.3"

      - name: Configure prod AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6
        with:
          cosign-release: v3.0.6

      - name: Verify release and dev test marker
        run: |
          aws ecr get-login-password --region "${AWS_REGION}" |
            cosign login --username AWS --password-stdin \
              "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

          aws ssm get-parameter \
            --name "${SSM_RELEASES_PATH}/${RELEASE_ID}/manifest" \
            --query Parameter.Value \
            --output text > /tmp/release-manifest.json
          aws ssm get-parameter \
            --name "${SSM_RELEASES_PATH}/${RELEASE_ID}/tested/dev" \
            --query Parameter.Value \
            --output text > /tmp/tested-dev.json

          ruby scripts/validate-release-manifest.rb /tmp/release-manifest.json "${RELEASE_ID}"
          python3 - <<'PY'
          import json

          marker = json.load(open("/tmp/tested-dev.json", encoding="utf-8"))
          if marker.get("status") != "succeeded":
              raise SystemExit("release does not have a successful dev test marker")
          PY

          python3 -c 'import json; print("\n".join(v["reference"] for v in json.load(open("/tmp/release-manifest.json"))["images"].values()))' |
          while IFS= read -r REFERENCE; do
            cosign verify \
              --certificate-identity "${EXPECTED_CERTIFICATE_IDENTITY}" \
              --certificate-oidc-issuer "${EXPECTED_OIDC_ISSUER}" \
              "${REFERENCE}" >/dev/null
          done

      - name: Update prod desired state
        id: values
        run: |
          ruby scripts/update-release-values.rb /tmp/release-manifest.json "${HELM_VALUES_FILE}"
          helm lint helm/voting-app --values "${HELM_VALUES_FILE}"
          helm template voting-prod helm/voting-app --values "${HELM_VALUES_FILE}" >/dev/null

          if git diff --quiet -- "${HELM_VALUES_FILE}"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create prod promotion pull request
        id: promotion
        if: steps.values.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH="automation/promote-prod"
          git config user.name "voting-promotion-bot[bot]"
          git config user.email "voting-promotion-bot[bot]@users.noreply.github.com"
          git switch -C "${BRANCH}"
          git add "${HELM_VALUES_FILE}"
          git commit -m "Promote prod release ${RELEASE_ID}"
          git push --force --set-upstream origin "${BRANCH}"

          PR_URL=""
          for ATTEMPT in $(seq 1 6); do
            PR_URL=$(gh pr list \
              --base main \
              --head "${BRANCH}" \
              --state open \
              --json url \
              --jq '.[0].url' 2>/dev/null || true)
            if [ -n "${PR_URL}" ]; then
              break
            fi

            echo "Promotion PR not found; create attempt ${ATTEMPT}/6."
            if ! gh pr create \
              --base main \
              --head "${BRANCH}" \
              --title "Promote prod release ${RELEASE_ID}" \
              --body "Promotes the dev-tested signed release ${RELEASE_ID} by immutable ECR digest."; then
              echo "GitHub did not confirm PR creation; checking the branch again before retrying." >&2
            fi
            sleep 10
          done

          if [ -z "${PR_URL}" ]; then
            PR_URL=$(gh pr list \
              --base main \
              --head "${BRANCH}" \
              --state open \
              --json url \
              --jq '.[0].url' 2>/dev/null || true)
          fi
          if [ -z "${PR_URL}" ]; then
            echo "Unable to find or create the prod promotion PR after 6 attempts." >&2
            exit 1
          fi

          AUTO_MERGE_READY=false
          for ATTEMPT in $(seq 1 6); do
            PR_STATE=$(gh pr view "${PR_URL}" \
              --json state,autoMergeRequest \
              --jq 'if .state == "MERGED" or .autoMergeRequest != null then "ready" else "pending" end' \
              2>/dev/null || true)
            if [ "${PR_STATE}" = ready ]; then
              AUTO_MERGE_READY=true
              break
            fi

            echo "Enable auto-merge attempt ${ATTEMPT}/6."
            if ! gh pr merge "${PR_URL}" --auto --squash --delete-branch; then
              echo "GitHub did not confirm auto-merge; checking PR state before retrying." >&2
            fi
            sleep 10
          done

          if [ "${AUTO_MERGE_READY}" != true ]; then
            PR_STATE=$(gh pr view "${PR_URL}" \
              --json state,autoMergeRequest \
              --jq 'if .state == "MERGED" or .autoMergeRequest != null then "ready" else "pending" end' \
              2>/dev/null || true)
            if [ "${PR_STATE}" != ready ]; then
              echo "Unable to enable auto-merge for ${PR_URL} after 6 attempts." >&2
              exit 1
            fi
          fi

          echo "pr_url=${PR_URL}" >> "$GITHUB_OUTPUT"

      - name: Wait for promotion merge
        if: steps.values.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_URL: ${{ steps.promotion.outputs.pr_url }}
        run: |
          for _ in $(seq 1 120); do
            STATE=$(gh pr view "${PR_URL}" --json state --jq .state)
            case "${STATE}" in
              MERGED) exit 0 ;;
              CLOSED) echo "Promotion PR closed without merging." >&2; exit 1 ;;
            esac
            sleep 10
          done
          echo "Timed out waiting for promotion PR to merge." >&2
          exit 1

      - name: Verify prod rollout and image digests
        run: |
          aws eks update-kubeconfig --region "${AWS_REGION}" --name "${EKS_CLUSTER_NAME}"

          RELEASE_APPLIED=false
          for _ in $(seq 1 60); do
            RELEASE_APPLIED=true
            for SERVICE in vote result worker; do
              ACTUAL_RELEASE=$(kubectl get deployment "${SERVICE}" \
                -n "${K8S_NAMESPACE}" \
                -o jsonpath='{.spec.template.metadata.annotations.voting\.devsecops/release-id}' \
                2>/dev/null || true)
              if [ "${ACTUAL_RELEASE}" != "${RELEASE_ID}" ]; then
                echo "Waiting for Argo CD: ${SERVICE} has release '${ACTUAL_RELEASE:-missing}', expected '${RELEASE_ID}'."
                RELEASE_APPLIED=false
              fi
            done

            if [ "${RELEASE_APPLIED}" = true ]; then
              break
            fi
            sleep 10
          done

          if [ "${RELEASE_APPLIED}" != true ]; then
            echo "Timed out waiting for Argo CD to apply release ${RELEASE_ID}." >&2
            kubectl get deployments -n "${K8S_NAMESPACE}" \
              -o custom-columns='NAME:.metadata.name,RELEASE:.spec.template.metadata.annotations.voting\.devsecops/release-id,IMAGE:.spec.template.spec.containers[0].image'
            exit 1
          fi

          kubectl rollout status statefulset/db -n "${K8S_NAMESPACE}" --timeout=10m
          for DEPLOYMENT in redis vote result worker; do
            kubectl rollout status "deployment/${DEPLOYMENT}" -n "${K8S_NAMESPACE}" --timeout=10m
          done

          for SERVICE in vote result worker; do
            EXPECTED=$(SERVICE="${SERVICE}" python3 -c 'import json,os; print(json.load(open("/tmp/release-manifest.json"))["images"][os.environ["SERVICE"]]["reference"])')
            ACTUAL=$(kubectl get deployment "${SERVICE}" -n "${K8S_NAMESPACE}" -o jsonpath='{.spec.template.spec.containers[0].image}')
            test "${ACTUAL}" = "${EXPECTED}"
          done

      - name: Run in-cluster prod smoke test
        run: |
          SMOKE_POD="release-smoke-${GITHUB_RUN_ID}"
          VOTE_IMAGE=$(python3 -c 'import json; print(json.load(open("/tmp/release-manifest.json"))["images"]["vote"]["reference"])')
          cleanup() {
            kubectl delete pod "${SMOKE_POD}" -n "${K8S_NAMESPACE}" --ignore-not-found --wait=false >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          kubectl delete pod "${SMOKE_POD}" -n "${K8S_NAMESPACE}" --ignore-not-found
          kubectl run "${SMOKE_POD}" \
            -n "${K8S_NAMESPACE}" \
            --image="${VOTE_IMAGE}" \
            --restart=Never \
            --command -- python -c \
              'import urllib.request; urllib.request.urlopen("http://vote", timeout=10); urllib.request.urlopen("http://result:4000", timeout=10)'

          for _ in $(seq 1 60); do
            PHASE=$(kubectl get pod "${SMOKE_POD}" -n "${K8S_NAMESPACE}" -o jsonpath='{.status.phase}')
            case "${PHASE}" in
              Succeeded) break ;;
              Failed)
                kubectl logs "${SMOKE_POD}" -n "${K8S_NAMESPACE}"
                exit 1
                ;;
            esac
            sleep 5
          done
          test "$(kubectl get pod "${SMOKE_POD}" -n "${K8S_NAMESPACE}" -o jsonpath='{.status.phase}')" = "Succeeded"

      - name: Record successful prod deployment
        env:
          WORKFLOW_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          TESTED_PARAMETER="${SSM_RELEASES_PATH}/${RELEASE_ID}/tested/prod"
          if ! aws ssm get-parameter --name "${TESTED_PARAMETER}" >/dev/null 2>&1; then
            aws ssm put-parameter \
              --name "${TESTED_PARAMETER}" \
              --type String \
              --value "{\"status\":\"succeeded\",\"workflow_url\":\"${WORKFLOW_URL}\"}"
          fi
          aws ssm put-parameter \
            --name "${SSM_ENV_PATH}/current-release" \
            --type String \
            --value "${RELEASE_ID}" \
            --overwrite
