name: Reusable - Docker CI

on:
  workflow_call:
    inputs:
      run_build:
        description: Build and test application containers
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  security-events: write

jobs:
  docker-ci:
    name: Docker Build, Image Scan and Compose Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        if: inputs.run_build
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Check Docker version
        if: inputs.run_build
        run: |
          docker --version
          docker compose version

      - name: Generate ephemeral test database password
        if: inputs.run_build
        run: echo "POSTGRES_PASSWORD=$(openssl rand -hex 24)" >> "$GITHUB_ENV"

      - name: Validate docker-compose.yml
        if: inputs.run_build
        run: docker compose config

      - name: Build Docker images
        if: inputs.run_build
        run: docker compose build

      - name: Scan vote image with Trivy
        if: inputs.run_build
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: voting-vote:local
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table

      - name: Scan result image with Trivy
        if: inputs.run_build
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: voting-result:local
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table

      - name: Scan worker image with Trivy
        if: inputs.run_build
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: voting-worker:local
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table

      - name: Start services
        if: inputs.run_build
        run: docker compose up -d

      - name: Wait for services
        if: inputs.run_build
        run: |
          sleep 20
          docker compose ps

      - name: Test vote service
        if: inputs.run_build
        run: curl -f http://localhost:5000 || exit 1

      - name: Test result service
        if: inputs.run_build
        run: curl -f http://localhost:5001 || exit 1

      - name: Show logs
        if: ${{ always() && inputs.run_build }}
        run: docker compose logs --no-color

      - name: Stop services
        if: ${{ always() && inputs.run_build }}
        run: docker compose down -v

      - name: Skip container tests for deployment-only change
        if: ${{ !inputs.run_build }}
        run: echo "No application or container source changed; Docker CI is not required."
