name: Reusable - Docker CI

on:
  workflow_call:

permissions:
  contents: read
  security-events: write

jobs:
  docker-ci:
    name: Docker Build, Image Scan and Compose Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Check Docker version
        run: |
          docker --version
          docker compose version

      - name: Generate ephemeral test database password
        run: echo "POSTGRES_PASSWORD=$(openssl rand -hex 24)" >> "$GITHUB_ENV"

      - name: Validate docker-compose.yml
        run: docker compose config

      - name: Build Docker images
        run: docker compose build

      - name: Scan vote image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: voting-vote:local
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table

      - name: Scan result image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: voting-result:local
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table

      - name: Scan worker image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: voting-worker:local
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table

      - name: Start services
        run: docker compose up -d

      - name: Wait for services
        run: |
          sleep 20
          docker compose ps

      - name: Test vote service
        run: curl -f http://localhost:5000 || exit 1

      - name: Test result service
        run: curl -f http://localhost:5001 || exit 1

      - name: Show logs
        if: always()
        run: docker compose logs --no-color

      - name: Stop services
        if: always()
        run: docker compose down -v
