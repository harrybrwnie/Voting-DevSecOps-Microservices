name: Reuseable - Push Images to ECR

on:
  workflow_call:

permissions:
  contents: read
  id-token: write
  security-events: write

jobs:
  push-ecr:
    name: Build, Scan and Push Images to ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Check Docker version
        run: |
          docker --version
          docker compose version

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Generate ephemeral build database password
        run: echo "POSTGRES_PASSWORD=$(openssl rand -hex 24)" >> "$GITHUB_ENV"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
          docker login --username AWS --password-stdin \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

      - name: Validate docker-compose.yml
        run: docker compose config

      - name: Build Docker images
        run: docker compose build

      - name: Scan vote image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: voting-vote:local
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table

      - name: Scan result image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: voting-result:local
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table

      - name: Scan worker image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: voting-worker:local
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table

      - name: Push immutable images to ECR
        run: |
          ECR_REGISTRY=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

          for SERVICE in vote result worker; do
            REPOSITORY="voting-${SERVICE}"

            if aws ecr describe-images \
              --repository-name "${REPOSITORY}" \
              --image-ids imageTag="${IMAGE_TAG}" >/dev/null 2>&1; then
              echo "${REPOSITORY}:${IMAGE_TAG} already exists; skipping push."
              continue
            fi

            docker tag "voting-${SERVICE}:local" "${ECR_REGISTRY}/${REPOSITORY}:${IMAGE_TAG}"
            docker push "${ECR_REGISTRY}/${REPOSITORY}:${IMAGE_TAG}"
          done
